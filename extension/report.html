<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentReady — Full Site Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --text-2: #475569; --text-3: #94a3b8;
      --primary: #2563eb; --primary-light: #dbeafe;
      --green: #10b981; --green-light: #d1fae5;
      --yellow: #f59e0b; --yellow-light: #fef3c7;
      --red: #ef4444; --red-light: #fee2e2;
      --purple: #7c3aed;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Header */
    .report-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: var(--text); color: white;
    }
    .report-logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
    .report-actions { display: flex; gap: 8px; }
    .btn {
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-outline { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); }
    .btn-outline:hover { border-color: white; }

    /* Loading */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 120px 24px; color: var(--text-3);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      max-width: 500px; margin: 60px auto; padding: 20px;
      background: var(--red-light); color: var(--red);
      border-radius: 8px; text-align: center;
    }

    /* Summary */
    .summary-section {
      text-align: center; padding: 40px 24px 32px;
    }
    .summary-domain {
      font-size: 14px; color: var(--text-3); margin-bottom: 4px;
    }
    .summary-title {
      font-size: 28px; font-weight: 800; margin-bottom: 24px;
    }
    .summary-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 16px; max-width: 700px; margin: 0 auto;
    }
    .summary-stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px;
    }
    .summary-stat-val {
      font-size: 32px; font-weight: 800;
    }
    .summary-stat-lbl {
      font-size: 11px; color: var(--text-3); text-transform: uppercase;
      font-weight: 600; margin-top: 4px; letter-spacing: 0.04em;
    }

    /* Score Ring */
    .score-ring-wrap {
      display: inline-block; position: relative;
      width: 100px; height: 100px; margin-bottom: 16px;
    }
    .score-ring { width: 100%; height: 100%; transform: rotate(-90deg); }
    .score-ring-bg { fill: none; stroke: var(--border); stroke-width: 7; }
    .score-ring-fill {
      fill: none; stroke-width: 7; stroke-linecap: round;
      stroke-dasharray: 282.743; stroke-dashoffset: 282.743;
      transition: stroke-dashoffset 1s ease-out;
    }
    .score-ring-val {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px; font-weight: 800;
    }

    /* Pages Table */
    .pages-section {
      margin-top: 32px;
    }
    .pages-title {
      font-size: 18px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .pages-subtitle { font-size: 13px; color: var(--text-3); font-weight: 400; }
    .page-row {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px; margin-bottom: 6px;
      cursor: pointer; transition: all 0.2s;
    }
    .page-row:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(37,99,235,0.1); }
    .page-row.locked {
      opacity: 0.45; filter: blur(3px);
      pointer-events: none; user-select: none; cursor: default;
    }
    .page-score {
      flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: white;
    }
    .page-info { flex: 1; min-width: 0; }
    .page-url {
      font-size: 14px; font-weight: 500; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .page-meta { font-size: 12px; color: var(--text-3); margin-top: 3px; }
    .page-meta span { margin-right: 12px; }
    .page-arrow { font-size: 20px; color: var(--text-3); }
    .page-row:hover .page-arrow { color: var(--primary); }
    .page-lock { color: var(--text-3); }

    /* Pro Overlay */
    .pro-overlay {
      text-align: center; padding: 40px 24px;
      background: linear-gradient(135deg, rgba(37,99,235,0.04), rgba(124,58,237,0.06));
      border: 1px solid var(--border); border-radius: 10px; margin-top: 16px;
    }
    .pro-overlay svg { margin-bottom: 12px; color: var(--primary); }
    .pro-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .pro-text { font-size: 14px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; }

    /* Page Detail */
    .detail-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px; margin-top: 24px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .detail-back {
      background: none; border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 6px; font-size: 13px;
      font-weight: 600; color: var(--text-2); cursor: pointer;
    }
    .detail-back:hover { border-color: var(--primary); color: var(--primary); }
    .detail-score { font-size: 36px; font-weight: 800; }
    .detail-url {
      font-size: 14px; color: var(--text-2); margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: 1px solid var(--border);
    }
    .detail-section-title {
      font-size: 12px; font-weight: 700; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.04em;
      margin: 20px 0 10px;
    }

    /* Category Card */
    .cat-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 6px;
    }
    .cat-bar-wrap { flex: 1; min-width: 0; }
    .cat-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .cat-detail { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .cat-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .cat-bar-fill { height: 100%; border-radius: 2px; }
    .cat-score { font-size: 18px; font-weight: 700; min-width: 40px; text-align: right; }

    /* Issue */
    .issue {
      display: flex; gap: 10px; padding: 10px 12px;
      background: var(--bg); border-radius: 6px; margin-bottom: 4px;
    }
    .issue-badge {
      flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; margin-top: 1px;
    }
    .issue-badge.error { background: var(--red-light); color: var(--red); }
    .issue-badge.warning { background: var(--yellow-light); color: var(--yellow); }
    .issue-badge.success { background: var(--green-light); color: var(--green); }
    .issue-badge.info { background: var(--primary-light); color: var(--primary); }
    .issue-body { flex: 1; }
    .issue-title { font-weight: 600; font-size: 13px; }
    .issue-text { font-size: 12px; color: var(--text-2); margin-top: 2px; }

    /* Form Card */
    .form-card {
      background: var(--bg); border-radius: 8px; padding: 12px; margin-bottom: 6px;
    }
    .form-header { display: flex; justify-content: space-between; align-items: center; }
    .form-name { font-weight: 600; font-size: 14px; }
    .form-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 100px;
    }
    .form-badge.ready { background: var(--green-light); color: var(--green); }
    .form-badge.not-ready { background: var(--red-light); color: var(--red); }
    .form-fields { margin-top: 8px; }
    .form-field {
      display: flex; gap: 10px; padding: 4px 0;
      border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-2);
    }
    .form-field:last-child { border: none; }
    .ff-name { font-weight: 500; color: var(--text); min-width: 100px; }
    .ff-type { color: var(--text-3); min-width: 60px; }

    .empty-state { text-align: center; padding: 24px; color: var(--text-3); font-size: 13px; }

    .timestamp {
      text-align: center; font-size: 12px; color: var(--text-3);
      margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .summary-stats { grid-template-columns: repeat(2, 1fr); }
      .report-header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="report-header">
    <div class="report-logo">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" fill="#2563eb"/>
        <path d="M16 6 L16 16 L24 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="16" cy="16" r="2" fill="white"/>
      </svg>
      AgentReady Report
    </div>
    <div class="report-actions">
      <button class="btn btn-outline" id="btn-download">Download HTML</button>
      <button class="btn btn-primary" id="btn-new-scan" style="display:none">New Scan</button>
    </div>
  </header>

  <!-- Loading -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading report data...</p>
  </div>

  <!-- Error -->
  <div id="error" class="error-msg" style="display:none"></div>

  <!-- Report Content -->
  <div id="report" class="container" style="display:none">
    <!-- Summary -->
    <div class="summary-section">
      <div class="summary-domain" id="r-domain"></div>
      <div class="score-ring-wrap">
        <svg viewBox="0 0 120 120" class="score-ring">
          <circle cx="60" cy="60" r="45" class="score-ring-bg"/>
          <circle cx="60" cy="60" r="45" class="score-ring-fill" id="r-ring"/>
        </svg>
        <div class="score-ring-val" id="r-score">0</div>
      </div>
      <div class="summary-title">Full Site Scan Report</div>
      <div class="summary-stats">
        <div class="summary-stat">
          <div class="summary-stat-val" id="r-avg">0</div>
          <div class="summary-stat-lbl">Avg Score</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-val" id="r-pages">0</div>
          <div class="summary-stat-lbl">Pages</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-val" id="r-forms">0</div>
          <div class="summary-stat-lbl">Forms</div>
        </div>
        <div class="summary-stat">
          <div class="summary-stat-val" id="r-issues">0</div>
          <div class="summary-stat-lbl">Issues</div>
        </div>
      </div>
    </div>

    <!-- Pages -->
    <div class="pages-section">
      <div class="pages-title">
        <span>Pages</span>
        <span class="pages-subtitle" id="r-pages-sub"></span>
      </div>
      <div id="r-page-list"></div>
      <div id="r-pro-overlay" class="pro-overlay" style="display:none">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <div class="pro-title">Unlock Full Report</div>
        <div class="pro-text">Free plan shows detailed analysis for 3 pages.<br>Upgrade to Pro to unlock all pages with categories, issues, and code generation.</div>
        <a href="https://erold90.github.io/AgentReady/#pricing" target="_blank" class="btn btn-primary">See Pro Plans</a>
      </div>
    </div>

    <!-- Page Detail -->
    <div id="r-detail" class="detail-panel" style="display:none"></div>

    <div class="timestamp" id="r-timestamp"></div>
  </div>

  <script src="js/analyzer.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
