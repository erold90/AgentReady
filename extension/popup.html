<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentReady</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">&#9889;</span>
      <span class="logo-text">AgentReady</span>
    </div>
    <button id="scan-btn" class="scan-btn">Rescan</button>
  </header>

  <!-- Loading (shown immediately on open) -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Analyzing page...</p>
  </div>

  <!-- Error -->
  <div id="error" class="error-msg" hidden></div>

  <!-- Results -->
  <div id="results" hidden>
    <!-- Score -->
    <div class="score-section">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 120 120" class="score-ring">
          <circle cx="60" cy="60" r="54" class="score-ring-bg"/>
          <circle cx="60" cy="60" r="54" class="score-ring-fill" id="score-ring-fill"/>
        </svg>
        <div class="score-value" id="score-value">0</div>
      </div>
      <div class="score-info">
        <div class="score-label">Agent Readiness Score</div>
        <div class="score-url" id="score-url"></div>
        <div class="score-summary" id="score-summary"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat"><span class="stat-val" id="s-forms">0</span><span class="stat-lbl">Forms</span></div>
      <div class="stat"><span class="stat-val" id="s-webmcp">0</span><span class="stat-lbl">WebMCP</span></div>
      <div class="stat"><span class="stat-val" id="s-issues">0</span><span class="stat-lbl">Issues</span></div>
      <div class="stat"><span class="stat-val" id="s-https">-</span><span class="stat-lbl">HTTPS</span></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="categories">Score</button>
      <button class="tab" data-tab="issues">Issues</button>
      <button class="tab" data-tab="forms">Forms</button>
      <button class="tab" data-tab="tools">Tools</button>
    </div>

    <!-- Tab: Categories -->
    <div class="tab-content active" id="tab-categories">
      <div id="categories-list"></div>
    </div>

    <!-- Tab: Issues -->
    <div class="tab-content" id="tab-issues">
      <div id="issues-list"></div>
    </div>

    <!-- Tab: Forms -->
    <div class="tab-content" id="tab-forms">
      <div id="forms-list"></div>
    </div>

    <!-- Tab: Suggested Tools -->
    <div class="tab-content" id="tab-tools">
      <div id="tools-list"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btn-full-site" class="btn-action btn-fullsite">Full Site Scan</button>
      <button id="btn-full-report" class="btn-action btn-secondary">Full Report on AgentReady.dev</button>
    </div>

    <!-- Full Site Scan Section -->
    <div id="fullsite-section" hidden>
      <!-- Progress -->
      <div id="fs-progress" class="fs-progress" hidden>
        <div class="fs-progress-text" id="fs-progress-text">Discovering sitemap...</div>
        <div class="fs-progress-bar">
          <div class="fs-progress-fill" id="fs-progress-fill"></div>
        </div>
      </div>

      <!-- Summary Card -->
      <div id="fs-summary" class="fs-summary" hidden>
        <div class="fs-summary-title">Full Site Scan Results</div>
        <div class="fs-stats-row">
          <div class="fs-stat">
            <span class="fs-stat-val" id="fs-avg-score">0</span>
            <span class="fs-stat-lbl">Avg Score</span>
          </div>
          <div class="fs-stat">
            <span class="fs-stat-val" id="fs-total-pages">0</span>
            <span class="fs-stat-lbl">Pages</span>
          </div>
          <div class="fs-stat">
            <span class="fs-stat-val" id="fs-total-forms">0</span>
            <span class="fs-stat-lbl">Forms</span>
          </div>
          <div class="fs-stat">
            <span class="fs-stat-val" id="fs-total-issues">0</span>
            <span class="fs-stat-lbl">Issues</span>
          </div>
        </div>
      </div>

      <!-- Page List -->
      <div id="fs-pages" class="fs-pages"></div>

      <!-- Pro Overlay -->
      <div id="fs-pro-overlay" class="fs-pro-overlay" hidden>
        <div class="fs-pro-content">
          <div class="fs-pro-icon">&#128274;</div>
          <div class="fs-pro-title">Upgrade to Pro</div>
          <div class="fs-pro-text">Free plan shows 3 pages. Unlock full site analysis with Pro.</div>
          <button class="fs-pro-btn" disabled>Coming Soon</button>
        </div>
      </div>

      <!-- Error -->
      <div id="fs-error" class="fs-error" hidden></div>
    </div>

    <!-- Page Detail Panel (overlay) -->
    <div id="page-detail" class="page-detail" hidden>
      <div class="pd-header">
        <button id="pd-back" class="pd-back">&larr; Back</button>
        <div class="pd-score" id="pd-score">0</div>
      </div>
      <div class="pd-url" id="pd-url"></div>
      <div class="pd-section-title">Categories</div>
      <div id="pd-categories"></div>
      <div class="pd-section-title">Issues</div>
      <div id="pd-issues"></div>
      <div class="pd-section-title">Forms</div>
      <div id="pd-forms"></div>
    </div>
  </div>

  <script src="js/analyzer.js"></script>
  <script src="js/sitemap.js"></script>
  <script src="js/crawler.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
